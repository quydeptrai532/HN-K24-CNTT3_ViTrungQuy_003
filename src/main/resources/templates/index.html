<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4"> Book Management</h2>
    <form class="d-flex mb-3" method="get">
        <input class="form-control me-2"
               type="text"
               name="keyword"
               placeholder="Tìm kiếm theo tên sách hoặc tên tác giả..."
               th:value="${keyword}">
        <button class="btn btn-primary">Search</button>
    </form>

    <div th:if="${#lists.isEmpty(books)}" class="alert alert-warning text-center">
        Hiện chưa có cuốn sách nào trong cửa hàng
    </div>

    <table class="table table-bordered table-hover" th:if="${!#lists.isEmpty(books)}">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Date</th>
            <th class="text-center">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="b : ${books}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.title}"></td>
            <td th:text="${b.author}"></td>
            <td th:text="${#temporals.format(b.date, 'dd/MM/yyyy')}"></td>

            <td class="text-center">
                <a class="btn btn-warning btn-sm"
                   th:href="@{/edit/{id}(id=${b.id})}">Edit</a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/delete/{id}(id=${b.id})}"
                   onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/(page=${currentPage - 1}, keyword=${keyword})}">
                    Previous
                </a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/(page=${i}, keyword=${keyword})}"
                   th:text="${i + 1}">
                </a>
            </li>
            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/(page=${currentPage + 1}, keyword=${keyword})}">
                    Next
                </a>
            </li>
        </ul>
    </nav>
    <div class="text-end mt-3">
        <a href="/add" class="btn btn-success">+ Thêm sách mới </a>
    </div>

</div>

</body>
</html>
